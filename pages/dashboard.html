<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Projects</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header">
                <h1>Projects</h1>
                <a href="create-project.html" class="btn btn-primary" style="width: auto">+ New Project</a>
            </div>
            
            <div id="loader" role="status" aria-live="polite">Loading Projects...</div>
            
            <div class="grid" id="stats-grid" style="display: none;">
                <div class="card">
                    <h3>Total Projects</h3>
                    <h2 style="font-size: 36px; margin: 10px 0 0 0;" id="statProjects">0</h2>
                </div>
                <div class="card">
                    <h3>Total Risks</h3>
                    <h2 style="font-size: 36px; margin: 10px 0 0 0; color: var(--danger)" id="statRisks">0</h2>
                </div>
                <div class="card">
                    <h3>Workflow</h3>
                    <h2 style="font-size: 24px; margin: 18px 0 0 0; color: var(--success)">Project First</h2>
                </div>
            </div>

            <h2 style="margin-top: 40px">Project List</h2>
            <div class="project-grid" id="projects-list"></div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
