<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Projects</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header">
                <h1>Projects</h1>
                <button id="openCreateProjectModalBtn" type="button" class="btn btn-primary" style="width: auto">+ New Project</button>
            </div>
            
            <div id="loader" role="status" aria-live="polite">Loading Projects...</div>
            
            <div class="grid" id="stats-grid" style="display: none;">
                <div class="card">
                    <h3>Total Projects</h3>
                    <h2 style="font-size: 36px; margin: 10px 0 0 0;" id="statProjects">0</h2>
                </div>
                <div class="card">
                    <h3>Total Risks</h3>
                    <h2 style="font-size: 36px; margin: 10px 0 0 0; color: var(--danger)" id="statRisks">0</h2>
                </div>
                <div class="card">
                    <h3>Workflow</h3>
                    <h2 style="font-size: 24px; margin: 18px 0 0 0; color: var(--success)">Project First</h2>
                </div>
            </div>

            <h2 style="margin-top: 40px">Project List</h2>
            <div class="project-grid" id="projects-list"></div>

            <div class="modal-backdrop" id="createProjectBackdrop" hidden></div>
            <div class="modal" id="createProjectModal" aria-hidden="true" hidden>
                <div class="modal__header">
                    <h3 style="margin:0;">Create Project</h3>
                    <button type="button" class="modal__close" id="closeCreateProjectModalBtn" aria-label="Close project modal">&times;</button>
                </div>
                <form id="dashboardCreateProjectForm">
                    <div class="form-group">
                        <label for="modalProjectTitle">Title</label>
                        <input type="text" id="modalProjectTitle" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="modalProjectDescription">Description</label>
                        <textarea id="modalProjectDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="modalProjectStartDate">Start Date</label>
                            <input type="date" id="modalProjectStartDate" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label for="modalProjectEndDate">End Date</label>
                            <input type="date" id="modalProjectEndDate" class="form-control" required />
                        </div>
                    </div>
                    <div class="card-inline-actions" style="margin-top: 6px;">
                        <button type="submit" class="btn btn-primary" id="modalProjectSaveBtn">Create Project</button>
                        <button type="button" class="btn" id="modalProjectCancelBtn" style="background:#e2e8f0; color:#0f172a;">Cancel</button>
                    </div>
                    <div id="modalProjectMessage" class="status-message" role="alert" aria-live="polite"></div>
                </form>
            </div>

            <div class="modal-backdrop" id="editProjectBackdrop" hidden></div>
            <div class="modal" id="editProjectModal" aria-hidden="true" hidden>
                <div class="modal__header">
                    <h3 style="margin:0;">Edit Project</h3>
                    <button type="button" class="modal__close" id="closeEditProjectModalBtn" aria-label="Close edit project modal">&times;</button>
                </div>
                <form id="dashboardEditProjectForm">
                    <input type="hidden" id="editProjectId" />
                    <div class="form-group">
                        <label for="editProjectTitle">Title</label>
                        <input type="text" id="editProjectTitle" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="editProjectDescription">Description</label>
                        <textarea id="editProjectDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="editProjectStartDate">Start Date</label>
                            <input type="date" id="editProjectStartDate" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label for="editProjectEndDate">End Date</label>
                            <input type="date" id="editProjectEndDate" class="form-control" required />
                        </div>
                    </div>
                    <div class="card-inline-actions" style="margin-top: 6px;">
                        <button type="submit" class="btn btn-primary" id="editProjectSaveBtn">Save Changes</button>
                        <button type="button" class="btn" id="editProjectCancelBtn" style="background:#e2e8f0; color:#0f172a;">Cancel</button>
                    </div>
                    <div id="editProjectMessage" class="status-message" role="alert" aria-live="polite"></div>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
