<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Reports</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header">
                <div>
                    <h1>Reporting Center</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <button class="btn btn-primary btn-auto" id="topExportBtn">Quick Export CSV</button>
                    <div style="background: var(--primary-color); color: white; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem;">
                        AS
                    </div>
                </div>
            </div>

            <div class="card" style="margin-top: 30px; max-width: 800px; margin-left: auto; margin-right: auto; padding: 40px;">
                <div style="text-align: center; margin-bottom: 30px;">
                    <span style="font-size: 3rem; display: block; margin-bottom: 10px;">📊</span>
                    <h2>Risk Registry CSV Export</h2>
                    <p style="color: var(--text-muted);">Generate a high-level spreadsheet containing all authenticated Projects, Risks, Impacts, and Owners.</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" class="form-control" id="startDate" />
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date</label>
                        <input type="date" class="form-control" id="endDate" />
                    </div>
                </div>

                <div style="margin-top: 30px;">
                    <button id="generateCsvBtn" class="btn btn-primary" style="padding: 16px; font-size: 1.1rem;">
                        <span style="margin-right: 8px;">📥</span> Download Master CSV Report
                    </button>
                </div>

                <div id="reportMessage" class="status-message" style="margin-top: 20px; text-align: center;" aria-live="polite"></div>
            </div>

            <div id="loader" role="status" aria-live="polite" style="display: none;">Generating Database Dump...</div>
        </div>
    </div>
    
    <script src="../js/auth.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/reports.js"></script>
</body>
</html>
