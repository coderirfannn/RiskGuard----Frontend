<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Create Risk</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header">
                <div>
                    <div class="breadcrumb"><a href="dashboard.html">Projects</a> / <a id="projectLink" href="dashboard.html">Loading project...</a> / Create Risk</div>
                    <h1 style="margin:0;">Create New Risk</h1>
                </div>
            </div>
            
            <div class="card" style="max-width: 800px; margin-bottom: 20px;">
                <h3 id="projectName" style="margin-top:0; margin-bottom:8px;">Loading project...</h3>
                <p id="projectContext" style="margin:0; color:var(--text-muted);">Risks can only be created inside a project.</p>
            </div>

            <div class="card" style="max-width: 800px;">
                <form id="createRiskForm">
                    <div class="form-group">
                        <label for="title">Risk Title</label>
                        <input type="text" id="title" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="probability">Probability</label>
                            <select id="probability" class="form-control" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="impact">Impact</label>
                            <select id="impact" class="form-control" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                                <option value="Critical">Critical</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="mitigationPlan">Mitigation Actions</label>
                        <textarea id="mitigationPlan" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="currentStatus">Initial Current Status</label>
                        <select id="currentStatus" class="form-control" required>
                            <option value="Identified">Identified</option>
                            <option value="Mitigating">Mitigating</option>
                            <option value="Resolved">Resolved</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Risk</button>
                    <div id="createFormMessage" class="status-message" role="alert" aria-live="polite"></div>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/risks.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            loadSidebar();
            initCreateForm();
        });
    </script>
</body>
</html>
