<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Projects</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header">
                <div>
                    <h1>Projects</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div style="position: relative; color: var(--text-muted); cursor: pointer;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <div style="position: relative; color: var(--text-muted); cursor: pointer;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                        <span style="position: absolute; top: 0px; right: 0px; background: var(--danger); width: 8px; height: 8px; border-radius: 50%;"></span>
                    </div>
                    <div style="background: var(--primary-color); color: white; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem;">
                        AS
                    </div>
                    <button id="openCreateProjectModalBtn" type="button" class="btn btn-primary btn-auto" style="margin-left: 10px;">+ New Project</button>
                </div>
            </div>
            
            <div id="loader" role="status" aria-live="polite">Loading Projects...</div>
            
            <div class="grid" id="stats-grid" style="display: none;">
                <div class="card">
                    <h3>Total Projects</h3>
                    <h2 class="metric-value" id="statProjects">0</h2>
                </div>
                <div class="card">
                    <h3>Total Risks</h3>
                    <h2 class="metric-value metric-value-danger" id="statRisks">0</h2>
                </div>
                <div class="card">
                    <h3>Workflow</h3>
                    <h2 class="metric-value metric-value-success metric-value-sm">Project First</h2>
                </div>
            </div>

            <h2 class="section-title">Project List</h2>
            <div class="project-grid" id="projects-list"></div>

            <div class="modal-backdrop" id="createProjectBackdrop" hidden></div>
            <div class="modal" id="createProjectModal" aria-hidden="true" hidden>
                <div class="modal__header">
                    <h3>Create Project</h3>
                    <button type="button" class="modal__close" id="closeCreateProjectModalBtn" aria-label="Close project modal">&times;</button>
                </div>
                <form id="dashboardCreateProjectForm">
                    <div class="form-group">
                        <label for="modalProjectTitle">Title</label>
                        <input type="text" id="modalProjectTitle" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="modalProjectDescription">Description</label>
                        <textarea id="modalProjectDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="modalProjectStartDate">Start Date</label>
                            <input type="date" id="modalProjectStartDate" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label for="modalProjectEndDate">End Date</label>
                            <input type="date" id="modalProjectEndDate" class="form-control" required />
                        </div>
                    </div>
                    <div class="card-inline-actions modal-actions-tight">
                        <button type="submit" class="btn btn-primary" id="modalProjectSaveBtn">Create Project</button>
                        <button type="button" class="btn" id="modalProjectCancelBtn">Cancel</button>
                    </div>
                    <div id="modalProjectMessage" class="status-message" role="alert" aria-live="polite"></div>
                </form>
            </div>

            <div class="modal-backdrop" id="editProjectBackdrop" hidden></div>
            <div class="modal" id="editProjectModal" aria-hidden="true" hidden>
                <div class="modal__header">
                    <h3>Edit Project</h3>
                    <button type="button" class="modal__close" id="closeEditProjectModalBtn" aria-label="Close edit project modal">&times;</button>
                </div>
                <form id="dashboardEditProjectForm">
                    <input type="hidden" id="editProjectId" />
                    <div class="form-group">
                        <label for="editProjectTitle">Title</label>
                        <input type="text" id="editProjectTitle" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="editProjectDescription">Description</label>
                        <textarea id="editProjectDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="editProjectStartDate">Start Date</label>
                            <input type="date" id="editProjectStartDate" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label for="editProjectEndDate">End Date</label>
                            <input type="date" id="editProjectEndDate" class="form-control" required />
                        </div>
                    </div>
                    <div class="card-inline-actions modal-actions-tight">
                        <button type="submit" class="btn btn-primary" id="editProjectSaveBtn">Save Changes</button>
                        <button type="button" class="btn" id="editProjectCancelBtn">Cancel</button>
                    </div>
                    <div id="editProjectMessage" class="status-message" role="alert" aria-live="polite"></div>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/projects-list.js"></script>
</body>
</html>
