<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - All Risks</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header">
                <h1>All Risks</h1>
                <a href="create-project.html" class="btn btn-primary" style="width: auto">+ New Project</a>
            </div>
            
            <div id="loader" role="status" aria-live="polite">Loading Risks...</div>
            <div class="grid" id="all-risks-grid"></div>

    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            loadSidebar();
            loadAllRisks();
        });
    </script>

</html>
