<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - History</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .timeline { border-left: 2px solid var(--border-color); margin-left: 20px; padding-left: 30px; position: relative;}
        .timeline-item { margin-bottom: 30px; position: relative; }
        .timeline-item::before { content: ""; position: absolute; left: -36px; top: 0; width: 10px; height: 10px; background: var(--primary-color); border-radius: 50%; box-shadow: 0 0 0 4px var(--white); }
        .timeline-date { font-size: 13px; color: var(--text-color); opacity: 0.7; margin-bottom: 5px; display: block;}
    </style>
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header">
                <h1>Status History Timeline</h1>
                <a id="backBtn" href="risks.html" class="btn" style="background:#e2e8f0; color:#0f172a; width:auto;">&larr; Back to Risk</a>
            </div>
            
            <div class="card" style="max-width: 800px;">
                <div id="loader" role="status" aria-live="polite">Loading History...</div>
                <div class="timeline" id="timelineList" style="display:none;"></div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/risks.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            loadSidebar();
            initHistory();
        });
    </script>
</body>
</html>
