<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - 404</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="auth-wrapper" style="text-align: center; flex-direction:column;">
        <h1 style="font-size: 80px; margin:0; color:var(--primary-color);">404</h1>
        <h2>Page not found</h2>
        <p style="margin-bottom: 20px;">The resource you are looking for does not exist.</p>
        <a id="returnLink" href="login.html" class="btn btn-primary" style="width: auto;">Return</a>
    </div>
    <script>
        const returnLink = document.getElementById('returnLink');
        const hasToken = !!(sessionStorage.getItem('token') || localStorage.getItem('token'));
        returnLink.href = hasToken ? 'dashboard.html' : 'login.html';
        returnLink.textContent = hasToken ? 'Return to Dashboard' : 'Go to Login';
    </script>
</body>
</html>
