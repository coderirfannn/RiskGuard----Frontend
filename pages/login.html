<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Login</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" autocomplete="email" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" autocomplete="current-password" minlength="8" required />
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
                <div id="loginMessage" class="status-message" role="alert" aria-live="polite"></div>
            </form>
            <p style="text-align: center; margin-top: 15px; font-size: 14px;">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script>
        requireGuest();
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const messageEl = document.getElementById('loginMessage');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            messageEl.className = 'status-message';
            messageEl.textContent = '';
            btn.textContent = 'Loading...';
            btn.disabled = true;
            try {
                const data = await fetchAPI('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email,
                        password
                    })
                });
                if (typeof setAuthToken === 'function') {
                    setAuthToken(data.token, false);
                } else {
                    sessionStorage.setItem('token', data.token);
                }
                window.location.href = 'dashboard.html';
            } catch (err) {
                messageEl.className = 'status-message error';
                messageEl.textContent = err.message || 'Login failed. Please try again.';
            } finally {
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
