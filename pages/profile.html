<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Profile</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header">
                <div>
                    <h1 style="margin: 0;">My Profile</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div style="position: relative; color: var(--text-muted); cursor: pointer;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <div style="position: relative; color: var(--text-muted); cursor: pointer;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                        <span style="position: absolute; top: 0px; right: 0px; background: var(--danger); width: 8px; height: 8px; border-radius: 50%;"></span>
                    </div>
                    <div style="background: var(--primary-color); color: white; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem;">
                        AS
                    </div>
                </div>
            </div>
            
            <div class="card" style="max-width: 600px;">
                <div id="loader" role="status" aria-live="polite">Loading Profile...</div>
                <div id="profileMessage" class="status-message" role="alert" aria-live="polite"></div>
                <div id="profileDetails" style="display:none; text-align:center;">
                    <div style="width:100px; height:100px; background:var(--primary-color); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; margin: 0 auto 20px;">
                        <span id="pInitials">U</span>
                    </div>
                    <h2 id="pName" style="margin-bottom:5px;"></h2>
                    <p id="pEmail" style="color:var(--text-color); opacity:0.8; margin-bottom:20px;"></p>
                    <span class="badge badge-low" id="pRole" style="text-transform:uppercase;"></span>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            requireAuth();
            loadSidebar();
            const loader = document.getElementById('loader');
            const message = document.getElementById('profileMessage');
            try {
                loader.style.display = 'block';
                const user = await fetchAPI('/auth/profile');
                const name = (user && user.name ? user.name : 'Unknown User').trim();
                document.getElementById('pName').textContent = name;
                document.getElementById('pEmail').textContent = user && user.email ? user.email : '-';
                document.getElementById('pRole').textContent = user && user.role ? user.role : 'user';
                document.getElementById('pInitials').textContent = name.charAt(0).toUpperCase();
                document.getElementById('profileDetails').style.display = 'block';
            } catch (err) {
                message.className = 'status-message error';
                message.textContent = err.message || 'Error loading profile.';
            } finally { loader.style.display = 'none'; }
        });
    </script>
</body>
</html>
