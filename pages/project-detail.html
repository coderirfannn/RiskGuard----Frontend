<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Project Detail</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header project-hero">
                <div class="project-hero__meta">
                    <div class="breadcrumb"><a href="projects.html">Projects</a> / <span id="breadcrumbProjectName">Loading...</span></div>
                    <h1 id="projectTitle" class="title-tight">Loading project...</h1>
                    <p id="projectDescription" class="title-none text-muted"></p>
                </div>
                <div class="card-inline-actions card-inline-actions-no-top">
                    <button id="createRiskBtn" type="button" class="btn btn-primary btn-auto">Create New Risk</button>
                    <a href="projects.html" class="btn btn-auto">Back to Projects</a>
                </div>
            </div>

            <div id="loader" role="status" aria-live="polite">Loading Project...</div>

            <div class="grid block-hidden" id="projectSummary">
                <div class="card">
                    <h3>Start Date</h3>
                    <h2 class="metric-value metric-value-sm" id="projectStartDate">-</h2>
                </div>
                <div class="card">
                    <h3>End Date</h3>
                    <h2 class="metric-value metric-value-sm" id="projectEndDate">-</h2>
                </div>
                <div class="card">
                    <h3>Risks</h3>
                    <h2 class="metric-value metric-value-sm metric-value-danger" id="projectRiskCount">0</h2>
                </div>
            </div>

            <div class="card section-card" id="projectRisksSection">
                <div class="header header-compact">
                    <h2 class="title-none">Risks in This Project</h2>
                </div>
                <div id="project-empty-state" class="empty-state block-hidden">
                    <h3 class="title-top-none">No risks yet</h3>
                    <p>Create the first risk inside this project.</p>
                </div>
                <div class="table-wrap block-hidden" id="project-risks-wrap">
                    <table class="data-table" id="project-risks-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Probability</th>
                                <th>Impact</th>
                                <th>Status</th>
                                <th>Updated</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="project-risks-grid"></tbody>
                    </table>
                </div>
            </div>

            <div class="modal-backdrop" id="createRiskBackdrop" hidden></div>
            <div class="modal" id="createRiskModal" aria-hidden="true" hidden>
                <div class="modal__header">
                    <h3 class="title-none">Create Risk</h3>
                    <button type="button" class="modal__close" id="closeCreateRiskModalBtn" aria-label="Close risk modal">&times;</button>
                </div>
                <form id="createRiskModalForm">
                    <div class="form-group">
                        <label for="riskTitle">Title</label>
                        <input type="text" id="riskTitle" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="riskDescription">Description</label>
                        <textarea id="riskDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="riskProbability">Probability</label>
                            <select id="riskProbability" class="form-control" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="riskImpact">Impact</label>
                            <select id="riskImpact" class="form-control" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                                <option value="Critical">Critical</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="riskMitigationActions">Mitigation Actions</label>
                        <textarea id="riskMitigationActions" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="riskCurrentStatus">Initial Current Status</label>
                        <select id="riskCurrentStatus" class="form-control" required>
                            <option value="Open">Open</option>
                            <option value="Monitoring">Monitoring</option>
                            <option value="Mitigated">Mitigated</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </div>
                    <div class="card-inline-actions modal-actions-tight">
                        <button type="submit" class="btn btn-primary" id="saveRiskModalBtn">Create Risk</button>
                        <button type="button" class="btn" id="cancelCreateRiskModalBtn">Cancel</button>
                    </div>
                    <div id="createRiskModalMessage" class="status-message" role="alert" aria-live="polite"></div>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/theme.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/project.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            loadSidebar();
            initProjectDetail();
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');
            if (user && user._id) {
                connectNotifications(user._id);
            }
        });
    </script>
