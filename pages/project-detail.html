<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Project Detail</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="header project-hero">
                <div class="project-hero__meta">
                    <div class="breadcrumb"><a href="dashboard.html">Projects</a> / <span id="breadcrumbProjectName">Loading...</span></div>
                    <h1 id="projectTitle" style="margin:0 0 10px 0;">Loading project...</h1>
                    <p id="projectDescription" style="margin:0; color:var(--text-muted);"></p>
                </div>
                <div class="card-inline-actions" style="margin-top: 0; gap:10px;">
                    <button id="createRiskBtn" type="button" class="btn btn-primary" style="width:auto;">Create New Risk</button>
                    <a href="dashboard.html" class="btn" style="background:#e2e8f0; color:#0f172a; width:auto;">Back to Projects</a>
                </div>
            </div>

            <div id="loader" role="status" aria-live="polite">Loading Project...</div>

            <div class="grid" id="projectSummary" style="display:none;">
                <div class="card">
                    <h3>Start Date</h3>
                    <h2 style="font-size: 24px; margin: 12px 0 0 0;" id="projectStartDate">-</h2>
                </div>
                <div class="card">
                    <h3>End Date</h3>
                    <h2 style="font-size: 24px; margin: 12px 0 0 0;" id="projectEndDate">-</h2>
                </div>
                <div class="card">
                    <h3>Risks</h3>
                    <h2 style="font-size: 24px; margin: 12px 0 0 0; color: var(--danger)" id="projectRiskCount">0</h2>
                </div>
            </div>

            <div class="card" id="projectRisksSection" style="display:none; margin-top: 20px;">
                <div class="header" style="margin-bottom:20px; padding-bottom:0; border-bottom:0;">
                    <h2 style="margin:0;">Risks in This Project</h2>
                </div>
                <div id="project-empty-state" class="empty-state" style="display:none;">
                    <h3 style="margin-top:0;">No risks yet</h3>
                    <p>Create the first risk inside this project.</p>
                </div>
                <div class="table-wrap" id="project-risks-wrap" style="display:none;">
                    <table class="data-table" id="project-risks-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Probability</th>
                                <th>Impact</th>
                                <th>Status</th>
                                <th>Updated</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="project-risks-grid"></tbody>
                    </table>
                </div>
            </div>

            <div class="modal-backdrop" id="createRiskBackdrop" hidden></div>
            <div class="modal" id="createRiskModal" aria-hidden="true" hidden>
                <div class="modal__header">
                    <h3 style="margin:0;">Create Risk</h3>
                    <button type="button" class="modal__close" id="closeCreateRiskModalBtn" aria-label="Close risk modal">&times;</button>
                </div>
                <form id="createRiskModalForm">
                    <div class="form-group">
                        <label for="riskTitle">Title</label>
                        <input type="text" id="riskTitle" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label for="riskDescription">Description</label>
                        <textarea id="riskDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="riskProbability">Probability</label>
                            <select id="riskProbability" class="form-control" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="riskImpact">Impact</label>
                            <select id="riskImpact" class="form-control" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                                <option value="Critical">Critical</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="riskMitigationActions">Mitigation Actions</label>
                        <textarea id="riskMitigationActions" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="riskCurrentStatus">Initial Current Status</label>
                        <select id="riskCurrentStatus" class="form-control" required>
                            <option value="Identified">Identified</option>
                            <option value="Mitigating">Mitigating</option>
                            <option value="Resolved">Resolved</option>
                        </select>
                    </div>
                    <div class="card-inline-actions" style="margin-top: 6px;">
                        <button type="submit" class="btn btn-primary" id="saveRiskModalBtn">Create Risk</button>
                        <button type="button" class="btn" id="cancelCreateRiskModalBtn" style="background:#e2e8f0; color:#0f172a;">Cancel</button>
                    </div>
                    <div id="createRiskModalMessage" class="status-message" role="alert" aria-live="polite"></div>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/project.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            loadSidebar();
            initProjectDetail();
        });
    </script>
</body>
</html>
